<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#FFFFFF">
    <title>MANU COACH PRO</title>
    
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #007AFF;
            --accent: #FF9500;
            --success: #34C759;
            --danger: #FF3B30;
            --bg: #F2F2F7;
            --card: #FFFFFF;
            --text: #000000;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            overscroll-behavior-y: contain;
            position: fixed;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            padding-top: env(safe-area-inset-top, 20px);
            padding-bottom: env(safe-area-inset-bottom, 100px);
        }

        h1 {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            text-align: center;
            font-size: 22px;
            letter-spacing: -0.5px;
            margin: 10px 0 25px 0;
            color: var(--text);
        }

        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: none;
            width: 100%;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #8E8E93;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            padding-left: 5px;
        }

        input, select {
            width: 100%;
            padding: 14px;
            background: #F2F2F7;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 12px;
            color: #000;
            outline: none;
            -webkit-appearance: none;
        }

        .row-tool { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
        
        .btn {
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            padding: 16px;
            transition: transform 0.1s ease;
        }

        .btn:active { transform: scale(0.96); }

        .btn-add { background: var(--primary); color: white; }
        .btn-del { 
            background: #FFEDED; 
            color: var(--danger); 
            min-width: 50px; 
            height: 50px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 20px;
            border-radius: 12px;
        }

        .btn-share { background: var(--success); color: white; margin-top: 10px; }

        #customArea { 
            display: none; 
            background: #F9F9F9; 
            padding: 15px; 
            border-radius: 18px; 
            border: 1px dashed #C7C7CC;
            margin-bottom: 15px;
        }

        .rutina-item {
            background: white;
            padding: 14px;
            border-radius: 16px;
            margin-bottom: 10px;
            border-left: 5px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }

        .grid-sets { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>TRAINER DATABASE 🦾</h1>

        <div class="card">
            <label>👤 CLIENTE</label>
            <input type="text" id="cName" placeholder="Nombre del alumno...">
        </div>

        <div class="card">
            <label>🎯 MÚSCULO ESPECÍFICO</label>
            <select id="mGroup" onchange="updateList()">
                <option value="">Seleccionar zona...</option>
                <option value="Cuádriceps 🦵">Cuádriceps 🦵</option>
                <option value="Femorales 🍗">Femorales (Isquios) 🍗</option>
                <option value="Glúteos 🍑">Glúteos 🍑</option>
                <option value="Pantorrillas 👣">Pantorrillas 👣</option>
                <option value="Aductores 🔄">Aductores (Interno) 🔄</option>
                <option value="Abductores ↔️">Abductores (Externo) ↔️</option>
                <option value="Pecho Superior ⬆️">Pecho Superior ⬆️</option>
                <option value="Pecho Medio ⬅️➡️">Pecho Medio ⬅️➡️</option>
                <option value="Pecho Inferior ⬇️">Pecho Inferior ⬇️</option>
                <option value="Espalda Amplitud 🦅">Espalda (Amplitud) 🦅</option>
                <option value="Espalda Grosor 🚣">Espalda (Grosor) 🚣</option>
                <option value="Espalda Baja 🪵">Espalda Baja 🪵</option>
                <option value="Hombro Frontal 🔘">Hombro Frontal 🔘</option>
                <option value="Hombro Lateral 🔘">Hombro Lateral 🔘</option>
                <option value="Hombro Posterior 🔘">Hombro Posterior 🔘</option>
                <option value="Bíceps 💪">Bíceps 💪</option>
                <option value="Tríceps 🦾">Tríceps 🦾</option>
                <option value="Antebrazos ✊">Antebrazos ✊</option>
                <option value="Abdomen 🍫">Abdomen 🍫</option>
                <option value="Trapecio 🐂">Trapecio 🐂</option>
            </select>

            <label>🏋️ EJERCICIO</label>
            <div class="row-tool">
                <select id="exSelect" style="flex-grow: 1; margin-bottom:0;"></select>
                <button class="btn-del" onclick="deleteEx()">🗑️</button>
            </div>

            <button onclick="showCustom()" style="background:none; border:none; color:var(--primary); font-size:12px; font-weight:700; cursor:pointer; margin-bottom:15px; text-align:left; padding:0;">+ AGREGAR NUEVO EJERCICIO</button>

            <div id="customArea">
                <input type="text" id="customName" placeholder="Nombre del ejercicio...">
                <button class="btn" style="background:var(--primary); color:white; padding:10px; font-size:13px;" onclick="saveCustom()">GUARDAR</button>
            </div>

            <div class="grid-sets">
                <div><label>SERIES</label><input type="number" id="sets" placeholder="4"></div>
                <div><label>REPS</label><input type="text" id="reps" placeholder="10-12 o fallo"></div>
            </div>

            <button class="btn btn-add" style="margin-top:5px;" onclick="addRoutine()">Añadir a la Rutina 📥</button>
        </div>

        <div class="card">
            <label>📋 RESUMEN DEL PLAN</label>
            <div id="display"></div>
            <button class="btn btn-share" onclick="shareWA()">ENVIAR POR WHATSAPP 📲</button>
        </div>
    </div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
        });
    }

    const dbBase = {
        "Cuádriceps 🦵": ["Sentadilla con Barra", "Prensa 45°", "Sentadilla Hack", "Extensiones", "Sentadilla Búlgara", "Zancadas", "Leg Press Horizontal", "Prensa Unilateral", "Sentadilla Frontal", "Landmine Squat", "Step Up Alto", "Sentadilla Sissy"],
        "Femorales 🍗": ["Peso Muerto Rumano", "Curl Femoral Tumbado", "Curl Femoral Sentado", "Curl Femoral de Pie", "Buenos Días", "Glute Ham Raise", "Peso Muerto Piernas Semirrígidas", "Nordic Curl"],
        "Glúteos 🍑": ["Hip Thrust", "Puente de Glúteo", "Kickbacks Polea", "Step Up Glúteo", "Abducción Máquina", "Peso Muerto Sumo", "Frog Pumps", "Hiperextensión 45°"],
        "Pantorrillas 👣": ["Elevación de Pie", "Elevación Sentado (Sóleo)", "Prensa Pantorrillas", "Elevaciones tipo Burro", "Elevación Unilateral"],
        "Aductores 🔄": ["Máquina Aductores", "Aductor Polea Baja", "Copenhague Plank", "Sentadilla Sumo Profunda"],
        "Abductores ↔️": ["Máquina Abductores", "Abducción con Banda", "Abducción Polea Baja", "Monster Walk"],
        "Pecho Superior ⬆️": ["Press Inclinado Barra", "Press Inclinado Mancuernas", "Aperturas Inclinadas", "Cruce Poleas Bajas", "Press Inclinado Smith", "Flexiones Pies Elevados"],
        "Pecho Medio ⬅️➡️": ["Press Banca Plano", "Press Mancuernas", "Peck Deck", "Hammer Press", "Floor Press", "Flexiones", "Cruce Poleas Medias"],
        "Pecho Inferior ⬇️": ["Press Declinado", "Dips (Fondos)", "Cruce Poleas Altas", "Aperturas Declinadas"],
        "Espalda Amplitud 🦅": ["Dominadas Pronas", "Jalón al Pecho", "Pull-over Polea Alta", "Jalón Agarre Neutro", "Jalón Unilateral"],
        "Espalda Grosor 🚣": ["Remo con Barra", "Remo Gironda", "Remo T", "Remo Mancuerna", "Remo Seal", "Remo Pendlay", "Remo Meadows"],
        "Espalda Baja 🪵": ["Hiperextensiones Lumbar", "Peso Muerto Convencional", "Rack Pulls", "Superman"],
        "Hombro Frontal 🔘": ["Press Militar", "Press Arnold", "Elevación Frontal Disco", "Frontales Polea"],
        "Hombro Lateral 🔘": ["Elevaciones Laterales", "Laterales Polea", "Laterales Máquina", "Laterales Inclinado"],
        "Hombro Posterior 🔘": ["Pájaros Mancuerna", "Facepull", "Peck Deck Inverso", "Pájaros Polea"],
        "Bíceps 💪": ["Curl Barra Z", "Curl Martillo", "Curl Scott", "Curl Alterno", "Curl Araña", "Curl Concentrado", "Curl 21"],
        "Tríceps 🦾": ["Press Francés Barra Z", "Polea Cuerda", "Copa Mancuerna", "Dips Paralelas", "Patada Polea", "Press Agarre Cerrado", "Skullcrushers"],
        "Antebrazos ✊": ["Curl Muñeca Supino", "Curl Muñeca Prono", "Paseo Granjero", "Curl Inverso"],
        "Abdomen 🍫": ["Crunch Polea Alta", "Elevación Piernas Colgado", "Rueda Abdominal", "Plancha", "Giros Rusos", "V-Ups"],
        "Trapecio 🐂": ["Encogimientos Mancuerna", "Encogimientos Barra", "Remo al Mentón"]
    };

    let miDB = JSON.parse(localStorage.getItem('manuGymMax_v12')) || dbBase;
    let rutinaActual = [];

    function saveDB() { localStorage.setItem('manuGymMax_v12', JSON.stringify(miDB)); }

    function updateList() {
        const m = document.getElementById('mGroup').value;
        const s = document.getElementById('exSelect');
        s.innerHTML = '<option value="">Elegir ejercicio...</option>';
        if(m) miDB[m].sort().forEach(ex => {
            let o = document.createElement('option');
            o.value = ex; o.innerText = ex; s.appendChild(o);
        });
    }

    function showCustom() {
        const m = document.getElementById('mGroup').value;
        if(!m) return;
        document.getElementById('customArea').style.display = 'block';
    }

    function saveCustom() {
        const m = document.getElementById('mGroup').value;
        const name = document.getElementById('customName').value;
        if(name && m) {
            if(!miDB[m].includes(name)) {
                miDB[m].push(name);
                saveDB();
                updateList();
                document.getElementById('exSelect').value = name;
            }
        }
        document.getElementById('customArea').style.display = 'none';
        document.getElementById('customName').value = "";
    }

    function deleteEx() {
        const m = document.getElementById('mGroup').value;
        const e = document.getElementById('exSelect').value;
        if(m && e && confirm(`¿Borrar ${e}?`)) {
            miDB[m] = miDB[m].filter(x => x !== e);
            saveDB();
            updateList();
        }
    }

    // FUNCIÓN REESCRITA PARA AGREGAR SIN LÍMITES
    function addRoutine() {
        const m = document.getElementById('mGroup').value;
        const e = document.getElementById('exSelect').value;
        const s = document.getElementById('sets').value || "4";
        let r = document.getElementById('reps').value || "10-12";
        
        if(r.toLowerCase().includes("fallo")) r = "al fallo 🧨";

        // Solo requiere Músculo y Ejercicio, sin importar cuántos lleves ya.
        if(m && e) {
            rutinaActual.push({ m, e, s, r });
            render();
            // Limpia campos de esfuerzo para el siguiente ejercicio
            document.getElementById('sets').value = "";
            document.getElementById('reps').value = "";
        }
    }

    function render() {
        const d = document.getElementById('display');
        d.innerHTML = "";
        rutinaActual.forEach((x, i) => {
            d.innerHTML += `
                <div class="rutina-item">
                    <div>
                        <b style="font-size:15px;">${x.e}</b><br>
                        <small style="color:#8E8E93">${x.m} • ${x.s}x${x.r}</small>
                    </div>
                    <div onclick="remove(${i})" style="color:var(--danger); font-weight:800; padding:10px; cursor:pointer; font-size:18px;">✕</div>
                </div>`;
        });
    }

    function remove(i) {
        rutinaActual.splice(i, 1);
        render();
    }

    function shareWA() {
        const name = document.getElementById('cName').value || "Campeón";
        if(rutinaActual.length === 0) return;
        let txt = `*PLAN DE ENTRENAMIENTO: ${name.toUpperCase()}* 🏋️‍♂️🔥%0A%0A`;
        rutinaActual.forEach(x => {
            txt += `⚡ *${x.m.toUpperCase()}*%0A   └ ${x.e} ➡️ *${x.s} x ${x.r}*%0A%0A`;
        });
        txt += `_¡Dale con todo!_ 💪🏁%0A*Coach Trainer*`;
        window.open(`https://api.whatsapp.com/send?text=${txt}`, '_blank');
    }
</script>
</body>
</html>
